<svg width="2172" height="724" viewBox="0 0 2172 724" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">pan-scm-sdk logo</title>
  <desc id="desc">A minimalist cloud icon with a code symbol, followed by the pan-scm-sdk wordmark, in the Gruvbox palette.</desc>
  <defs>
